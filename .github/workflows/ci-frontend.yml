name: "[CI] Frontend"

on:
  push:
    branches: ["main", "develop", "feature/*"]
    paths:
      - "CesiZenMobile/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    branches: ["main", "develop"]

jobs:
  lint:
    name: Linter (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./CesiZenMobile
    steps:
      - uses: actions/checkout@v4
      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          [cite_start]node-version: '20'
          cache: 'npm'
          cache-dependency-path: './CesiZenMobile/package-lock.json'
      - name: Installer les dépendances
        run: npm ci
      - name: Vérifier le code
        run: npm run lint --if-present


  security:
    name: 🛡️ Scan de sécurité (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lancer Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'CesiZenMobile/'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'


  build-prod:
    name: Vérification Build Prod
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
      - uses: actions/checkout@v4
      - name: Construire l'image Docker de Prod
        run: |
          cd CesiZenMobile
          docker build -t cesizen-frontend:prod .