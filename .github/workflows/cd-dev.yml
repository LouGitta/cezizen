name: "[CD] DEV - Build & Push"

on:
  push:
    branches: ["develop"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Passer le nom du repo en minuscules
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Connexion au registre GitHub (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construire et Pousser (Backend)
        uses: docker/build-push-action@v5
        with:
          context: ./backend/cesi_zen_api
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/backend:develop

      - name: Construire et Pousser (Frontend)
        uses: docker/build-push-action@v5
        with:
          context: ./CesiZenMobile
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/frontend:develop
