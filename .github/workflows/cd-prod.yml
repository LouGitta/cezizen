name: "[CD] PROD - Build, Push & Deploy"

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Images (PROD)
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Passer le nom du repo en minuscules
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Déterminer le Short SHA pour le versioning
        run: |
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Connexion au registre GitHub (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construire et Pousser (Backend)
        uses: docker/build-push-action@v5
        with:
          context: ./backend/cesi_zen_api
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/backend:latest
            ghcr.io/${{ env.REPO_LOWER }}/backend:${{ env.SHORT_SHA }}

      - name: Construire et Pousser (Frontend)
        uses: docker/build-push-action@v5
        with:
          context: ./CesiZenMobile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/frontend:latest
            ghcr.io/${{ env.REPO_LOWER }}/frontend:${{ env.SHORT_SHA }}

  simulate-deploy-prod:
    name: Notification CD PROD
    runs-on: ubuntu-latest
    needs: [build-and-push]

    steps:
      - name: Afficher le statut de déploiement
        run: |
          echo "======================================================"
          echo "📢 Branche main mise à jour et nouvelles images poussées (latest & short-sha)."
          echo "🚀 La VM de production va détecter et pull les modifications."
          echo "======================================================"

