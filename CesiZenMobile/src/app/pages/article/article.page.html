<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/home" text=""></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  @if (article && article.id) {
    <article class="article-container">
      
      <header class="article-header">
        <h1 class="article-title">{{ article.title }}</h1>
        
        <p class="article-date">{{ article.published | date:'dd MMMM yyyy' }}</p>
      </header>

      <div class="image-container">
        <img src="https://ionicframework.com/docs/img/demos/card-media.png" [alt]="article.title" />
      </div>
      <div class="article-content">
        <p style="white-space: pre-wrap;">{{ article.content }}</p>
      </div>

    </article>
  } 
  @else {
    <div class="ion-text-center" style="margin-top: 50px;">
      <p>Chargement de l'article...</p>
    </div>
  }

</ion-content>
