<ion-header class="ion-no-border zen-header">
  <ion-toolbar class="zen-top-toolbar" color="transparent">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" text="" style="color: #2C3E2E;"></ion-back-button>
    </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="zen-article-content">
  
  @if (article && article.id) {
    
    <div class="article-hero">
      @if (article.image) {
        <img [src]="article.image" [alt]="article.title"/>
      } @else {
        <img src="https://ionicframework.com/docs/img/demos/card-media.png" alt="Image par défaut"/>
      }
    </div>

    <article class="article-body">
      
      <header class="article-header">
        <span class="article-badge">Lecture Zen</span> 
        
        <div class="title-row">
          <h1 class="article-title">{{ article.title }}</h1>
          
          <ion-button fill="clear" (click)="toggleFavorite()" class="inline-favorite-btn">
            <ion-icon
              slot="icon-only"
              [name]="article.is_favorite ? 'heart' : 'heart-outline'" 
              [color]="article.is_favorite ? 'danger' : 'medium'">
            </ion-icon>
          </ion-button>
        </div>
        <p class="article-date">Publié le {{ article.published | date:'dd MMMM yyyy' }}</p>
      </header>
      
      <div class="article-text" [innerHTML]="article.content"></div>

    </article>

  } 
  @else {
    <div class="ion-text-center loading-container">
      <ion-spinner name="crescent" color="success"></ion-spinner>
      <p>Préparation de votre lecture...</p>
    </div>
  }

</ion-content>
