<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Tab 1
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Accueil</ion-title>
    </ion-toolbar>
  </ion-header>
 <ion-grid>
  <ion-row>
    @for (article of articles; track article.id) {
      <ion-col size="12" size-sm="6" size-md="4" size-lg="3">
        <ion-card>
          <img alt="Silhouette of mountains" src="https://ionicframework.com/docs/img/demos/card-media.png" />
          <ion-card-header>
            <ion-card-title>{{article.title}}</ion-card-title>
            <ion-card-subtitle>{{article.published | date:'dd MMMM yyyy'}}</ion-card-subtitle>
          </ion-card-header>

          <ion-card-content>
            {{article.content | firstSentence}}
          </ion-card-content>
          <ion-grid >
            <ion-button fill="clear">Lire la suite
              <ion-icon slot="end" name="arrow-forward"/>
            </ion-button>
          </ion-grid>
        </ion-card>
      </ion-col>
    } @empty {
      <p> No article</p>
    }
  </ion-row>
</ion-grid>

</ion-content>
