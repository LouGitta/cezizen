services:
  # --- Service Database Postgres ---
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_DB=cesi_zen
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=cesi_zen_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cesi_zen"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Service API Django ---
  backend:
    image: ghcr.io/lougitta/cezizen/backend:develop
    ports:
      - "8000:8000"
    volumes:
      - django_static:/app/staticfiles
    environment:
      - PYTHONUNBUFFERED=1
      - POSTGRES_DB=cesi_zen
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=cesi_zen_password
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - USE_POSTGRES=True
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG:-False}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # --- Service Application Mobile Web ---
  frontend:
    image: ghcr.io/lougitta/cezizen/frontend:develop
    ports:
      - "80:80"
    volumes:
      - django_static:/usr/share/nginx/html/static
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  django_static:
  postgres_data: